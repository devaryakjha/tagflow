name: tagflow_workspace
publish_to: none

environment:
  sdk: ">=3.9.0 <4.0.0"

workspace:
  - packages/tagflow
  - packages/tagflow_benchmarks
  - packages/tagflow_table
  - examples/tagflow

dev_dependencies:
  melos: ^7.8.1

melos:
  repository: https://github.com/devaryakjha/tagflow

  command:
    version:
      linkToCommits: true
      workspaceChangelog: true
      releaseUrl: true

  scripts:
    analyze:
      run: >
        dart run melos exec -c 1 --fail-fast --
        "flutter analyze . --fatal-infos"
      description: Run analyzer in all packages

    test:
      run: >
        dart run melos exec
        --scope=tagflow
        --scope=tagflow_table
        --scope=tagflow_benchmarks
        -c 1 --fail-fast --
        "flutter test --coverage"
      description: Run tests for all packages that have tests

    format:
      run: dart run melos exec -- "dart format ."
      description: Format all Dart files

    format:check:
      run: dart run melos exec -- "dart format --set-exit-if-changed ."
      description: Check if all Dart files are formatted

    lint:all:
      run: |
        dart run melos run analyze --no-select &&
        dart run melos run format:check --no-select
      description: Run all static analysis checks

    validate:
      run: |
        dart run melos run lint:all &&
        dart run melos run test --no-select
      description: Run all validations

    build:clean:
      run: dart run melos exec -- "flutter clean"
      description: Clean all build outputs

    pub:get:
      run: dart pub get
      description: Get packages for the workspace

    version:dev:
      run: dart run melos version --prerelease --preid=dev --yes
      description: Version packages with dev tag

    version:alpha:
      run: dart run melos version --prerelease --preid=alpha --yes
      description: Version packages with alpha tag

    version:stable:
      run: dart run melos version --graduate --yes
      description: Version packages for stable release

    publish:dry-run:
      run: dart run melos publish --no-private --yes
      description: Validate publishable packages without publishing

    publish:packages:
      run: dart run melos publish --no-private --yes --no-dry-run
      description: Publish packages to pub.dev

    bootstrap:clean:
      run: |
        dart run melos clean &&
        dart run melos bootstrap
      description: Clean and bootstrap workspace

    coverage:
      run: >
        dart run melos exec
        --scope=tagflow
        --scope=tagflow_table
        --scope=tagflow_benchmarks
        -c 1 --fail-fast --
        "flutter test --coverage"
      description: Run tests with coverage

    benchmark:fixtures:
      run: >
        dart run melos exec --scope=tagflow_benchmarks -c 1 --fail-fast --
        "flutter test test/fixture_validity_test.dart"
      description: Validate benchmark fixtures

    benchmark:micro:
      run: >
        dart run melos exec --scope=tagflow_benchmarks -c 1 --fail-fast --
        "flutter test test/run_parser_benchmarks_test.dart"
      description: Run Tagflow parser microbenchmarks

    benchmark:native-transport:
      run: >
        dart run melos exec --scope=tagflow_benchmarks -c 1 --fail-fast --
        "flutter test test/run_native_transport_benchmarks_test.dart"
      description: Run Tagflow native transport microbenchmarks

    benchmark:render:
      run: >
        dart run melos exec --scope=tagflow_benchmarks -c 1 --fail-fast --
        "flutter test test/run_render_benchmarks_test.dart"
      description: Run Tagflow widget render benchmarks

    benchmark:profile:
      run: >
        cd examples/tagflow &&
        flutter drive
        --driver=test_driver/perf_driver.dart
        --target=integration_test/tagflow_perf_test.dart
        -d ${TAGFLOW_PROFILE_DEVICE:-macos}
        --profile
        --dart-define=INTEGRATION_TEST_SHOULD_REPORT_RESULTS_TO_NATIVE=false
        --dart-define=TAGFLOW_RENDERER=${TAGFLOW_RENDERER:-tagflow}
        --dart-define=TAGFLOW_FIXTURE=${TAGFLOW_FIXTURE:-ai_answer_rich}
        --dart-define=TAGFLOW_PROFILE_HOLD_OPEN=${TAGFLOW_PROFILE_HOLD_OPEN:-false}
        ${TAGFLOW_PROFILE_HOLD_OPEN_SECONDS:+--dart-define=TAGFLOW_PROFILE_HOLD_OPEN_SECONDS=$TAGFLOW_PROFILE_HOLD_OPEN_SECONDS}
        --dart-define=TAGFLOW_PROFILE_VIEWPORT_MODE=${TAGFLOW_PROFILE_VIEWPORT_MODE:-observed_host}
        ${TAGFLOW_PROFILE_SYNTHETIC_LOGICAL_SIZE:+--dart-define=TAGFLOW_PROFILE_SYNTHETIC_LOGICAL_SIZE=$TAGFLOW_PROFILE_SYNTHETIC_LOGICAL_SIZE}
        ${TAGFLOW_PROFILE_SYNTHETIC_DEVICE_PIXEL_RATIO:+--dart-define=TAGFLOW_PROFILE_SYNTHETIC_DEVICE_PIXEL_RATIO=$TAGFLOW_PROFILE_SYNTHETIC_DEVICE_PIXEL_RATIO}
        ${TAGFLOW_PROFILE_MEMORY_FILE:+--profile-memory=$TAGFLOW_PROFILE_MEMORY_FILE}
      description: Run Tagflow profile-mode frame benchmark

    benchmark:profile:baselines:
      run: >
        cd packages/tagflow_benchmarks &&
        dart run bin/run_profile_baselines.dart
        --output-dir=${TAGFLOW_PROFILE_OUTPUT_DIR:-build/benchmarks/profile}
      description: Run a repeated profile benchmark matrix and persist JSON

    benchmark:profile:summarize:
      run: >
        cd packages/tagflow_benchmarks &&
        dart run bin/summarize_profile_baselines.dart
        --run-id=${TAGFLOW_PROFILE_RUN_ID}
        --output-dir=${TAGFLOW_PROFILE_OUTPUT_DIR:-build/benchmarks/profile}
      description: Summarize a persisted profile benchmark baseline run

    benchmark:profile:check:
      run: >
        cd packages/tagflow_benchmarks &&
        dart run bin/check_profile_baseline.dart
        --run-id=${TAGFLOW_PROFILE_RUN_ID}
        --output-dir=${TAGFLOW_PROFILE_OUTPUT_DIR:-build/benchmarks/profile}
        ${TAGFLOW_PROFILE_CHECK_POLICY:+--policy=$TAGFLOW_PROFILE_CHECK_POLICY}
        ${TAGFLOW_PROFILE_MIN_REPEATS:+--min-repeats=$TAGFLOW_PROFILE_MIN_REPEATS}
        ${TAGFLOW_PROFILE_EXPECTED_LOGICAL_SIZE:+--expected-logical-size=$TAGFLOW_PROFILE_EXPECTED_LOGICAL_SIZE}
        ${TAGFLOW_PROFILE_EXPECTED_DEVICE_PIXEL_RATIO:+--expected-device-pixel-ratio=$TAGFLOW_PROFILE_EXPECTED_DEVICE_PIXEL_RATIO}
      description: Check profile benchmark baseline collection completeness

    benchmark:memory-evidence:export:
      run: >
        cd packages/tagflow_benchmarks &&
        dart run bin/export_memory_evidence.dart
        --vm-service-uri=${TAGFLOW_MEMORY_EVIDENCE_VM_SERVICE_URI}
        --checkpoint=${TAGFLOW_MEMORY_EVIDENCE_CHECKPOINT}
        --output-dir=${TAGFLOW_MEMORY_EVIDENCE_OUTPUT_DIR:-build/benchmarks/profile-memory-evidence/manual}
        ${TAGFLOW_MEMORY_EVIDENCE_ISOLATE_ID:+--isolate-id=$TAGFLOW_MEMORY_EVIDENCE_ISOLATE_ID}
        ${TAGFLOW_MEMORY_EVIDENCE_TOP_CLASSES:+--top-classes=$TAGFLOW_MEMORY_EVIDENCE_TOP_CLASSES}
        ${TAGFLOW_MEMORY_EVIDENCE_GC:+--gc=$TAGFLOW_MEMORY_EVIDENCE_GC}
        ${TAGFLOW_MEMORY_EVIDENCE_RETAINING_CLASSES:+--retaining-path-classes=$TAGFLOW_MEMORY_EVIDENCE_RETAINING_CLASSES}
        ${TAGFLOW_MEMORY_EVIDENCE_RETAINING_SAMPLE_LIMIT:+--retaining-path-sample-limit=$TAGFLOW_MEMORY_EVIDENCE_RETAINING_SAMPLE_LIMIT}
        ${TAGFLOW_MEMORY_EVIDENCE_RETAINING_PATH_LIMIT:+--retaining-path-limit=$TAGFLOW_MEMORY_EVIDENCE_RETAINING_PATH_LIMIT}
      description: Export report-only memory evidence from a live VM service

    combine-coverage:
      run: |
        mkdir -p coverage &&
        lcov --add-tracefile packages/tagflow/coverage/lcov.info -o coverage/lcov.info
      description: Combine coverage reports
