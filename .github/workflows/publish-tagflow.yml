name: Publish tagflow

on:
  push:
    tags:
      - "tagflow-v*"

permissions:
  contents: read

jobs:
  publish:
    name: Publish tagflow to pub.dev
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up pub.dev OIDC
        uses: dart-lang/setup-dart@v1

      - name: Install dependencies
        run: flutter pub get

      - name: Check tag matches package version
        run: |
          package_version="$(awk '/^version:/ { print $2; exit }' packages/tagflow/pubspec.yaml)"
          expected_tag="tagflow-v${package_version}"
          if [ "${GITHUB_REF_NAME}" != "${expected_tag}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match ${expected_tag}"
            exit 1
          fi

      - name: Publish
        working-directory: packages/tagflow
        run: flutter pub publish --force
