name: tagflow_example
description: "An example app for the Tagflow package"
publish_to: "none"
version: 1.1.0

environment:
  sdk: ">=3.9.0 <4.0.0"

resolution: workspace

dependencies:
  cupertino_icons: ^1.0.8
  flutter:
    sdk: flutter
  flutter_html: ^3.0.0
  flutter_html_table: ^3.0.0
  flutter_markdown_plus: ^1.0.7
  flutter_widget_from_html_core: ^0.17.2
  go_router: ^14.6.2
  google_fonts: ^6.2.1
  markdown_widget: ^2.3.2+8
  tagflow: ^1.0.0-alpha.2
  tagflow_benchmarks: any
  tagflow_table: ^1.0.0-alpha.1
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - ../../packages/tagflow_benchmarks/fixtures/html/
    - ../../packages/tagflow_benchmarks/fixtures/markdown/
